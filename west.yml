manifest:
  version: "0.13"

  defaults:
    remote: zephyr

  remotes:
    - name: zephyr
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyr
      revision: v4.1.0
      import: true

  self:
    path: app
    west-commands: scripts/west-commands.yml

