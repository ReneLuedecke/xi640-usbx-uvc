# ============================================================
# Xi640 Project 22 — prj.conf
# STM32N6 Hybrid USBX/Zephyr UVC ISO
# ============================================================

# --- System ---
CONFIG_LOG=y
CONFIG_HWINFO=y
CONFIG_POLL=y

# --- Zephyr USB: VOLLSTAENDIG DEAKTIVIERT ---
# USBX besitzt den USB Controller exklusiv
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n
# CONFIG_UDC_DRIVER=n  # wird durch =n oben impliziert

# --- USBX Modul ---
# CONFIG_USBX=y  # aktivieren wenn Phase 2 abgeschlossen

# --- PSRAM ---
CONFIG_MEMC=y
CONFIG_MEMC_STM32=y

# --- Ethernet (Zephyr) ---
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_SOCKETS=y

# --- Stacks ---
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# --- Debug ---
CONFIG_ASSERT=y
CONFIG_PRINTK=y
