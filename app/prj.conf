CONFIG_LOG=y
CONFIG_POLL=y
CONFIG_HWINFO=y

# D-Cache (Cortex-M55) — PFLICHT fuer SRAM-Bandbreite ~50 MB/s statt ~15 MB/s
CONFIG_DCACHE=y
CONFIG_CACHE_MANAGEMENT=y

# USB device_next
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_UDC_BUF_POOL_SIZE=32768

# USBD Video — eingebaute Bulk-UVC Klasse
CONFIG_USBD_VIDEO_CLASS=y

# Video
CONFIG_VIDEO=y
CONFIG_VIDEO_SW_GENERATOR=y
CONFIG_VIDEO_BUFFER_POOL_NUM_MAX=2
CONFIG_VIDEO_BUFFER_POOL_SZ_MAX=614400

CONFIG_USBD_VIDEO_NUM_BUFS=128
CONFIG_USBD_VIDEO_LOG_LEVEL_INF=y
CONFIG_USBD_VIDEO_MAX_FORMATS=8
CONFIG_USBD_VIDEO_MAX_FRMIVAL=2
CONFIG_UDC_STM32_MAX_QMESSAGES=64

# Stack
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_UDC_STM32_STACK_SIZE=2048

# USB descriptor
CONFIG_SAMPLE_USBD_PID=0x0022
CONFIG_SAMPLE_USBD_PRODUCT="Xi640 UVC Bulk"
CONFIG_SAMPLE_USBD_MANUFACTURER="Optris"

# Lynred ATTO640D
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_PWM=y

# ── DCMIPP Parallel-Interface (14-Bit Pipe0 Dump Mode) ──────────────────────
CONFIG_VIDEO_STM32_DCMIPP=y
# RGB565 = FourCC "RGBP", bpp=16 → pitch=1280 korrekt (nicht SBGGR8 mit pitch=640!)
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_PIXEL_FORMAT="RGBP"
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_WIDTH=640
CONFIG_VIDEO_STM32_DCMIPP_SENSOR_HEIGHT=480
CONFIG_VIDEO_BUFFER_POOL_HEAP_SIZE=1024

# Kritisch: ohne dynamic interrupts zeigt DCMIPP IRQ48 auf Flash (Hard Fault!)
CONFIG_DYNAMIC_INTERRUPTS=y

# MEM_ATTR_HEAP führt zu Assertion-Fehler bei Boot (bekanntes P16-Problem)
CONFIG_MEM_ATTR_HEAP=n

# I-Cache für bessere Performance (D-Cache ist bereits aktiv)
CONFIG_ICACHE=y
